name: Export MegaDetector models to ONNX

on:
  workflow_dispatch:

jobs:
  export-onnx:
    name: Export ${{ matrix.model }} to ONNX
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        model:
          - MDV6-apa-rtdetr-c
          - MDV6-apa-rtdetr-e
          - MDV6-mit-yolov9-e
          - MDV6-mit-yolov9-c
          - mdv5a
          - mdv5b

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install onnx onnxruntime onnxscript

      - name: Export ${{ matrix.model }} to ONNX and validate with ONNX Runtime
        run: |
          python scripts/export_mdv6_apa_rtdetr_c_to_onnx.py \
            --model "${{ matrix.model }}" \
            --output "artifacts/${{ matrix.model }}.onnx" \
            --test-image-path IMG-20260410-WA0011.jpg \
            --summary-json "artifacts/${{ matrix.model }}-summary.json"

      - name: Upload ONNX artifacts
        # if: always() ensures the ONNX file is uploaded for manual inspection even
        # when the export/validation step above exits with an error.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.model }}-onnx
          path: |
            artifacts/${{ matrix.model }}.onnx*
            artifacts/${{ matrix.model }}*.data
            artifacts/${{ matrix.model }}*.weights
            artifacts/${{ matrix.model }}-summary.json
          if-no-files-found: warn
