name: Export MDV6 Apache RT-DETR-C to ONNX

on:
  workflow_dispatch:

jobs:
  export-onnx:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install onnx onnxruntime onnxscript

      - name: Export MDV6-apa-rtdetr-c to ONNX and validate with ONNX Runtime
        # continue-on-error keeps the job alive so the artifact upload step below can
        # always run even when validation reports a mismatch.  The exit code and any
        # warnings are still visible in the step log.
        continue-on-error: true
        run: |
          python scripts/export_mdv6_apa_rtdetr_c_to_onnx.py \
            --output artifacts/mdv6-apa-rtdetr-c.onnx \
            --test-image-path IMG-20260410-WA0011.jpg \
            --summary-json artifacts/mdv6-apa-rtdetr-c-summary.json

      - name: Upload ONNX artifact
        # if: always() ensures the ONNX file is uploaded for manual inspection even
        # when the export/validation step above exits with an error.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mdv6-apa-rtdetr-c-onnx
          path: |
            artifacts/mdv6-apa-rtdetr-c.onnx
            artifacts/mdv6-apa-rtdetr-c-summary.json
          if-no-files-found: warn
